<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adcker Replica - Astronaut GLB</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400&display=swap" rel="stylesheet" />

    <style>
        :root {
            --bg: #0d0d0d;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: "Syne", sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Cursor - Oculto en móviles */
        #custom-cursor {
            width: 15px;
            height: 15px;
            background: white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 999;
            mix-blend-mode: difference;
        }

        /* Navbar Responsive */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            position: fixed;
            width: 100%;
            box-sizing: border-box;
            z-index: 100;
        }

        .logo { font-weight: 800; font-size: 1.2rem; }
        .nav-links span { margin-left: 20px; font-family: "Inter"; font-size: 0.8rem; cursor: pointer; }

        /* Hero Centrado y Responsive */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center; /* Centra horizontalmente */
            text-align: center;   /* Centra el texto */
            padding: 0 5%;
        }

        .hero-title h1 {
            font-size: clamp(3rem, 12vw, 10rem); /* Responsive total */
            line-height: 0.85;
            margin: 0;
            text-transform: uppercase;
        }

        .hero-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .circle-media {
            width: clamp(40px, 12vw, 150px);
            height: clamp(40px, 12vw, 150px);
            border-radius: 50%;
            background: #333;
            overflow: hidden;
        }

        .circle-media img { width: 100%; height: 100%; object-fit: cover; }

        /* Contenedor del GLB Parallax */
        .contenedor-glb {
            width: 100%;
            height: 150vh; /* Espacio para scrollear el efecto */
            position: relative;
            display: flex;
            justify-content: center;
        }

        .objeto-fijo {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        model-viewer {
            width: 80vw; 
            height: 80vh;
            --poster-color: transparent;
        }

        /* Servicios */
        .services { padding: 100px 10%; }
        .service-item {
            border-top: 1px solid #333;
            padding: 40px 0;
            text-align: center;
        }
        .service-item h2 { font-size: clamp(2rem, 8vw, 6rem); margin: 0; }

        @media (max-width: 768px) {
            #custom-cursor { display: none; }
            .hero-row { gap: 10px; }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>

    <nav class="navbar">
        <div class="logo">adkr.</div>
        <div class="nav-links">
            <span>Our Work</span>
            <span>About</span>
        </div>
    </nav>

    <section class="hero">
        <h1 class="reveal">THE ART</h1>
        <div class="hero-row">
            <div class="circle-media">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=400" />
            </div>
            <h1 class="reveal">OF</h1>
        </div>
        <h1 class="reveal">HACKING</h1>
    </section>

    <div class="contenedor-glb">
        <div class="objeto-fijo">
            <model-viewer
                id="miModelo"
                src="Astronaut.glb"
                auto-rotate
                camera-controls
                disable-zoom
                shadow-intensity="1"
                environment-image="neutral"
                exposure="1"
            >
            </model-viewer>
        </div>
    </div>

    <section class="services">
        <div class="service-item"><h2>BEAUTY</h2></div>
        <div class="service-item"><h2>FASHION</h2></div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 1. Cursor
        const cursor = document.querySelector("#custom-cursor");
        document.addEventListener("mousemove", (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.3 });
        });

        // 2. Revelar Hero al cargar
        window.addEventListener("load", () => {
            gsap.from(".reveal", { y: 100, opacity: 0, stagger: 0.2, duration: 1, ease: "power4.out" });
            gsap.from(".circle-media", { scale: 0, duration: 1, ease: "back.out(1.7)", delay: 0.5 });
        });

        // 3. FUNCIONALIDAD PARALLAX GLB (Zoom In -> Zoom Out)
        const model = document.querySelector("#miModelo");

        gsap.timeline({
            scrollTrigger: {
                trigger: ".contenedor-glb",
                start: "top bottom", // Empieza cuando el contenedor entra en vista
                end: "bottom top",    // Termina cuando sale
                scrub: 1,             // Sigue el scroll con suavizado
            }
        })
        .fromTo(model, 
            { scale: 0.5, opacity: 0.3 }, // Estado inicial (pequeño y transparente)
            { scale: 1.8, opacity: 1, duration: 1 } // Crece al centro
        )
        .to(model, 
            { scale: 0.5, opacity: 0.3, duration: 1 } // Se encoge al salir
        );
    </script>
</body>
</html>
